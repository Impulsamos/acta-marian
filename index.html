<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTA DE VISITA TÉCNICA - ELECTRODOMÉSTICOS MARIANA</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #E8500A; --orange-light: #FFF3EE; --orange-mid: #FFD4BC;
            --navy: #1A1F36; --navy-mid: #2D3561; --blue-light: #EEF2FF;
            --gray: #6B7280; --gray-light: #F3F4F6; --border: #E5E7EB;
            --white: #FFFFFF; --text: #111827; --text-soft: #4B5563;
            --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #F0F2F8; min-height: 100vh; padding: 24px 16px 60px; color: var(--text); }
        .form-wrapper { max-width: 680px; margin: 0 auto; }
        .form-header { background: var(--navy); border-radius: var(--radius) var(--radius) 0 0; overflow: hidden; box-shadow: var(--shadow); }
        .header-accent { height: 8px; background: linear-gradient(90deg, var(--orange) 0%, #FF8C42 100%); }
        .header-content { padding: 28px 32px 24px; display: flex; align-items: center; gap: 20px; }
        .logo-circle { width: 52px; height: 52px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .header-text h1 { font-size: 20px; font-weight: 600; color: var(--white); letter-spacing: 0.02em; }
        .header-text p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }
        .section-card { background: var(--white); margin-top: 12px; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .section-card:first-of-type { border-radius: 0 0 var(--radius) var(--radius); margin-top: 0; }
        .section-header { display: flex; align-items: center; gap: 10px; padding: 18px 28px 16px; border-bottom: 1px solid var(--border); background: var(--blue-light); }
        .section-icon { width: 32px; height: 32px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--navy-mid); letter-spacing: 0.06em; text-transform: uppercase; }
        .section-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 500; color: var(--text-soft); }
        .required { color: var(--orange); margin-left: 2px; }
        input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,80,10,0.1); }
        .equipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 540px) { .equipo-grid { grid-template-columns: 1fr; } }
        .upload-area { border: 2px dashed var(--orange-mid); border-radius: 10px; background: var(--orange-light); padding: 28px 20px; text-align: center; cursor: pointer; position: relative; }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .firma-container { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: #FAFAFA; }
        .firma-header { display: flex; justify-content: space-between; padding: 10px 14px; background: var(--gray-light); border-bottom: 1px solid var(--border); }
        canvas { display: block; width: 100%; height: 140px; cursor: crosshair; touch-action: none; }
        .btn-submit { background: var(--orange); color: white; border: none; padding: 14px 40px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
        .success-overlay { display: none; position: fixed; inset: 0; background: rgba(26,31,54,0.7); z-index: 100; align-items: center; justify-content: center; }
        .success-overlay.show { display: flex; }
        .success-card { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 380px; }
    </style>
</head>
<body>
<div class="form-wrapper">
    <div class="form-header">
        <div class="header-accent"></div>
        <div class="header-content">
            <div class="logo-circle">🔧</div>
            <div class="header-text">
                <h1>ACTA DE VISITA TÉCNICA</h1>
                <p>Electrodomésticos Mariana SL · Sistema n8n + Odoo</p>
            </div>
        </div>
    </div>

    <form id="mainForm">
        <div class="section-card" style="border-radius:0 0 12px 12px;">
            <div class="section-header">
                <div class="section-icon">📋</div>
                <span class="section-title">Datos de la Visita</span>
            </div>
            <div class="section-body">
                <div class="field-group">
                    <label>ID Lead / Odoo <span class="required">*</span></label>
                    <input type="text" id="cardId" name="cardId" placeholder="ID de Odoo (Ej. 86)" required readonly style="background:#f9f9f9">
                </div>
                <div class="field-group">
                    <label>Nombre del asegurado <span class="required">*</span></label>
                    <input type="text" id="nombreAsegurado" name="nombreAsegurado" required>
                </div>
                <div class="field-group">
                    <label>DNI / NIF</label>
                    <input type="text" id="dni" name="dni">
                </div>
                <div class="field-group">
                    <label>Dirección</label>
                    <input type="text" id="domicilio" name="domicilio">
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <div class="section-icon">🏠</div>
                <span class="section-title">Detalles Técnicos</span>
            </div>
            <div class="section-body">
                <div class="equipo-grid">
                    <div class="field-group">
                        <label>Tipo de Aparato (Odoo) <span class="required">*</span></label>
                        <select id="averia" name="averia" required>
                            <option value="Uso / Desgaste">Uso / Desgaste</option>
                            <option value="Sin avería">Sin avería</option>
                            <option value="Incendio">Incendio</option>
                            <option value="Defecto de fabricación">Defecto de fabricación</option>
                            <option value="Caída de líquido">Caída de líquido</option>
                            <option value="Falta de mantenimiento">Falta de mantenimiento</option>
                            <option value="OTROS">OTROS</option>
                        </select>
                    </div>
                    <div class="field-group" id="averiaOtrosGroup" style="display:none">
                        <label>Si seleccionó OTROS, especifique:</label>
                        <input type="text" id="averiaOtros" name="averiaOtros" placeholder="Ej. Microondas">
                    </div>
                    <div class="field-group">
                        <label>Marca / Modelo</label>
                        <input type="text" id="marcaModelo" name="marcaModelo">
                    </div>
                </div>
                <div class="field-group">
                    <label>Diagnóstico Final <span class="required">*</span></label>
                    <textarea id="diagnostico" name="diagnostico" required placeholder="Escriba aquí el resultado de la visita..."></textarea>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <div class="section-icon">✍️</div>
                <span class="section-title">Validación y Firmas</span>
            </div>
            <div class="section-body">
                <div class="field-group">
                    <label>Firma del técnico</label>
                    <div class="firma-container">
                        <div class="firma-header"><button type="button" onclick="clearCanvas('firmaTecnico')">Borrar</button></div>
                        <canvas id="firmaTecnico"></canvas>
                    </div>
                </div>
                <div class="field-group">
                    <label>Firma del cliente</label>
                    <div class="firma-container">
                        <div class="firma-header"><button type="button" onclick="clearCanvas('firmaCliente')">Borrar</button></div>
                        <canvas id="firmaCliente"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding:20px;">
            <button type="submit" class="btn-submit" id="btnSubmit">Finalizar y Actualizar Odoo</button>
        </div>
    </form>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-card">
        <h2>✅ ¡Acta Registrada!</h2>
        <p>Los datos han vuelto a Odoo correctamente.</p>
        <button onclick="location.reload()" style="padding:10px 20px; margin-top:20px; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
    // PRELLENAR DESDE URL (Para que el técnico no escriba el ID)
    const params = new URLSearchParams(window.location.search);
    document.getElementById('cardId').value = params.get('id_op') || '';
    document.getElementById('nombreAsegurado').value = params.get('nombre') || '';

    // LÓGICA MOSTRAR OTROS
    document.getElementById('averia').addEventListener('change', function() {
        document.getElementById('averiaOtrosGroup').style.display = this.value === 'OTROS' ? 'block' : 'none';
    });

    // CONFIGURACIÓN CANVAS FIRMAS
    function initCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        let drawing = false;
        canvas.width = canvas.offsetWidth;
        canvas.height = 140;
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#1A1F36';

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return [t.clientX - r.left, t.clientY - r.top];
        };

        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(...getPos(e)); });
        canvas.addEventListener('mousemove', (e) => { if(drawing) { ctx.lineTo(...getPos(e)); ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => drawing = false);
        // Soporte Táctil
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); ctx.moveTo(...getPos(e)); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(drawing) { ctx.lineTo(...getPos(e)); ctx.stroke(); } });
        canvas.addEventListener('touchend', () => drawing = false);
    }
    function clearCanvas(id) { const c = document.getElementById(id); c.getContext('2d').clearRect(0,0,c.width,c.height); }
    initCanvas('firmaTecnico'); initCanvas('firmaCliente');

    // ENVÍO A N8N
    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Sincronizando con Odoo...";

        const payload = {
            id_odoo: document.getElementById('cardId').value,
            tipo_averia_odoo: document.getElementById('averia').value,
            especificar_otros: document.getElementById('averiaOtros').value,
            diagnostico: document.getElementById('diagnostico').value,
            firma_tecnico: document.getElementById('firmaTecnico').toDataURL(),
            nombre_cliente: document.getElementById('nombreAsegurado').value
        };

        try {
            await fetch('https://n8n.srv1077755.hstgr.cloud/webhook/acta-visita-tecnica', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            document.getElementById('successOverlay').classList.add('show');
        } catch (err) {
            alert("Error de conexión. Intente de nuevo.");
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
