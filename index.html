<!DOCTYPE html>
<html>
<head>
    <title>Acta de Visita Técnica</title>
    <style>
        canvas { border: 1px solid #000; background: #fff; }
        .campo { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Acta de Visita Técnica</h2>
    
    <div class="campo">
        <label>ID Oportunidad:</label><br>
        <input type="text" id="id_op" value="183">
    </div>

    <div class="campo">
        <label>DNI Asegurado:</label><br>
        <input type="text" id="dni" value="12345678X">
    </div>

    <div class="campo">
        <label>Teléfono:</label><br>
        <input type="text" id="telefono" value="600000000">
    </div>

    <div class="campo">
        <label>Diagnóstico Técnico:</label><br>
        <textarea id="diagnostico">Equipo revisado, requiere cambio de pieza.</textarea>
    </div>

    <div class="campo">
        <label>Firma Técnico (Canvas):</label><br>
        <canvas id="canvasTecnico" width="300" height="100"></canvas>
    </div>

    <div class="campo">
        <label>Firma Cliente (Canvas):</label><br>
        <canvas id="canvasCliente" width="300" height="100"></canvas>
    </div>

    <button type="button" onclick="enviarAlWebhook()">Finalizar y Enviar a Odoo</button>

    <script>
        async function enviarAlWebhook() {
            // Referencias a los canvas para obtener la imagen
            const canvasTecnico = document.getElementById('canvasTecnico');
            const canvasCliente = document.getElementById('canvasCliente');

            // 1. Construcción del paquete de datos (Payload)
            const payload = {
                id_op: document.getElementById('id_op').value,
                dni: document.getElementById('dni').value,
                telefono: document.getElementById('telefono').value,
                diagnostico: document.getElementById('diagnostico').value,
                // Extraemos solo el código base64 de la imagen
                x_studio_firma_tecnico: canvasTecnico.toDataURL('image/png').split(',')[1],
                x_studio_firma_cliente: canvasCliente.toDataURL('image/png').split(',')[1]
            };

            console.log("Enviando paquete a n8n...", payload);

            // 2. Envío mediante POST (Necesario para firmas)
            try {
                const response = await fetch('https://n8n.srv1077755.hstgr.cloud/webhook/acta-visita-tecnica', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    alert("¡Conexión exitosa! Datos enviados a n8n.");
                } else {
                    alert("Error en el servidor n8n. Verifica el Webhook.");
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("No se pudo conectar con n8n. Revisa el CORS.");
            }
        }
    </script>
</body>
</html>
