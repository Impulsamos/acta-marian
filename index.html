<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --orange: #E8500A; --navy: #1A1F36; --white: #FFFFFF; --gray-light: #F3F4F6;
        --border: #E5E7EB; --radius: 12px; --shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F0F2F8; padding: 24px 16px; color: #111827; }
    .form-wrapper { max-width: 680px; margin: 0 auto; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .header { background: var(--navy); color: var(--white); padding: 28px; border-top: 8px solid var(--orange); }
    .section { padding: 24px 28px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 13px; font-weight: 600; color: var(--navy); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .field-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 500; color: #4B5563; }
    input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; }
    input:focus { outline: none; border-color: var(--orange); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .firma-container { border: 1px solid var(--border); background: #FAFAFA; border-radius: 8px; margin-top: 8px; }
    canvas { width: 100%; height: 140px; cursor: crosshair; touch-action: none; }
    .btn-submit { width: 100%; background: var(--orange); color: white; padding: 16px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px; font-size: 16px; }
    .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; color: white; z-index: 1000; }
    .success-overlay.show { display: flex; }
</style>
</head>
