<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Conexión n8n - Odoo</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        form { background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        div { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Test de Reporte Técnico</h2>
    <form method="POST" action="TU_URL_DE_WEBHOOK_AQUI">
        
        <div>
            <label>ID Oportunidad (Para Odoo):</label>
            <input type="number" name="id" value="174" required>
        </div>

        <div>
            <label>DNI Asegurado:</label>
            <input type="text" name="dni" placeholder="12345678X">
        </div>

        <div>
            <label>Marca del Equipo:</label>
            <input type="text" name="marca" placeholder="Ej: Samsung">
        </div>

        <div>
            <label>Tipo de Avería:</label>
            <select name="averia" onchange="document.getElementById('panel_otros').style.display = (this.value=='Otro')?'block':'none'">
                <option value="No enciende">No enciende</option>
                <option value="Fuga de gas">Fuga de gas</option>
                <option value="Otro">Otro (Especificar)</option>
            </select>
        </div>

        <div id="panel_otros" style="display:none;">
            <label>Especifique la avería:</label>
            <input type="text" name="averia_otros" placeholder="Describa aquí...">
        </div>

        <div>
            <label>Diagnóstico:</label>
            <textarea name="diagnostico" rows="3"></textarea>
        </div>

        <button type="submit">Enviar a n8n</button>
    </form>
</body>
</html>
