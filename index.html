<body>
<div class="form-wrapper">
    <div class="form-header">
        <div class="header-accent"></div>
        <div class="header-content">
            <div class="logo-circle">🔧</div>
            <div class="header-text">
                <h1>ACTA DE VISITA TÉCNICA</h1>
                <p>Electrodomésticos Mariana SL · Impulsamos</p>
            </div>
        </div>
    </div>

    <form id="mainForm">
        <div class="submit-area">
            <button type="submit" class="btn-submit" id="btnSubmit">Enviar Acta</button>
        </div>
    </form>
</div>

<script>
// 1. Evitar que el formulario se rompa si falta algún campo en la URL
(function() {
    try {
        const params = new URLSearchParams(window.location.search);
        const set = (id, key) => {
            const el = document.getElementById(id);
            if (el && params.get(key)) el.value = decodeURIComponent(params.get(key));
        };
        set('cardId', 'id_op');
        set('nombreAsegurado', 'nombre');
    } catch (e) { console.error("Error en pre-fill:", e); }
})();

// 2. Envío seguro a n8n
document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.innerText = "Enviando...";

    const payload = {
        id_op: document.getElementById('cardId').value,
        diagnostico: document.getElementById('diagnostico').value,
        // Agrega aquí los demás campos que necesites
    };

    try {
        const response = await fetch('https://n8n.srv1077755.hstgr.cloud/webhook/acta-visita-tecnica', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) alert("¡Enviado con éxito!");
    } catch (err) {
        alert("Error de conexión. Revisa el Webhook.");
    }
    btn.innerText = "Enviar Acta";
});
</script>
</body>
